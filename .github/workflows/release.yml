name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Tout l'historique pour calculer la version

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: CI log
        run: |
          echo "CI déclenchée le $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          node -v
          npm -v

      - name: Smoke test
        run: |
          node -e "require('assert').ok(true, 'Smoke test KO'); console.log('Smoke test OK')"

      - name: Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
